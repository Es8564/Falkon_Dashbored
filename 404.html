<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Falcon AI</title>
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        .container { max-width: 400px; }
        .code { font-size: 80px; font-weight: 900; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 14px; color: #8b94a8; margin-bottom: 24px; }
        a { display: inline-block; background: linear-gradient(135deg, #00d9ff, #00ff88); color: #0d1117; padding: 12px 28px; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 14px; }
        a:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html">← Back to Home</a>
    </div>
</body>
</html>
