        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }

        .btn-home:hover { filter: brightness(1.1); }
        .links { margin-top: 28px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a { color: #5b6580; text-decoration: none; font-size: 13px; transition: color 0.2s; }
        .links a:hover { color: #00d9ff; }
        .logo { font-size: 16px; font-weight: 900; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 24px; display: block; }
    </style>
</head>
